apiVersion: v1
kind: Config
clusters:
  - cluster:
      server: https://k8s-api.lucascajal.com
    name: homelab
contexts:
  - context:
      cluster: homelab
      user: homelab
    name: homelab
users:
  - name: homelab
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1beta1
        command: kubectl
        # Requires oidc-login plugin. Install it with `kubectl krew install oidc-login`
        args:
          - oidc-login
          - get-token
          - --oidc-issuer-url=https://lucascajal.eu.auth0.com/
          - --oidc-client-id=KWdIwT2ckCdAOfRmo54iXHnfotkv4r3r
          - --oidc-extra-scope=openid
          - --oidc-extra-scope=profile
          - --oidc-extra-scope=offline_access
