---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - github.com/traefik/traefik-helm-chart/traefik/crds?ref=v39.0.6
  - externalsecret.yaml
  - middleware.yaml
  - ingressroute.yaml
  - httproute.yaml
# - secretprovider.yaml
# - namespace.yaml

helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: v39.0.6
    releaseName: traefik
    namespace: traefik
    valuesFile: values.yaml
