---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
  namespace: argocd
spec:
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  destinations:
    - namespace: "*"
      server: "*"
  orphanedResources:
    warn: true
    ignore:
      # Auto-created by Kubernetes in every namespace
      - group: ""
        kind: "ConfigMap"
        name: "kube-root-ca.crt"
      - group: ""
        kind: "ServiceAccount"
        name: "default"
      # Secrets created by ExternalSecret operator (bitwarden)
      - group: ""
        kind: "Secret"
        name: "bitwarden-tls-certs"
      - group: ""
        kind: "Secret"
        name: "bitwarden-access-token"
      # Auto-generated by controllers
      - group: ""
        kind: "Secret"
        name: "argocd-redis"
      - group: ""
        kind: "Secret"
        name: "cert-manager-webhook-ca"
      - group: ""
        kind: "Secret"
        name: "ingress-nginx-admission"
      - group: ""
        kind: "Secret"
        name: "kyverno-*"
      # Auto-created by VPA recommender
      - group: "autoscaling.k8s.io"
        kind: "VerticalPodAutoscalerCheckpoint"
      # Leader election leases created by controllers
      - group: "coordination.k8s.io"
        kind: "Lease"
      # k3s system RBAC (cluster-scoped)
      - group: "rbac.authorization.k8s.io"
        kind: "ClusterRole"
      - group: "rbac.authorization.k8s.io"
        kind: "ClusterRoleBinding"
  sourceRepos:
    - https://github.com/lucascajal/k8s-playground.git
    - https://kubernetes.github.io/dashboard/
    - https://charts.jetstack.io # cert-manager
    - https://charts.external-secrets.io
    - https://kubernetes-sigs.github.io/metrics-server
    - https://prometheus-community.github.io/helm-charts
    - https://charts.fairwinds.com/stable # vpa via fairwinds
    - https://kyverno.github.io/kyverno
    - https://kubernetes-sigs.github.io/descheduler
