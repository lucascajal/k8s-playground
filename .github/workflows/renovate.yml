name: Renovate

# Setup: create a GitHub classic PAT and add it as a repo secret.
# (Fine-grained PATs are not reliably supported by Renovate)
#
# 1. Go to GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)
# 2. Generate a new token with scope: repo (full) and workflow
# 3. Go to this repo → Settings → Secrets and variables → Actions → New repository secret
#    Name: RENOVATE_TOKEN, Value: <the token you just created>

on:
  schedule:
    - cron: "0 4 * * *" # Every day at 4am
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]
    paths: [renovate.json, .github/workflows/renovate.yml] # Re-run immediately when config changes
  pull_request_target:
    types: [closed]

jobs:
  renovate:
    if: github.event_name != 'pull_request' || (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'renovate/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "Renovate Bot <lucascajal@users.noreply.github.com>"
