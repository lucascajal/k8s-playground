---
apiVersion: v1
kind: Service
metadata:
  name: kube-apiserver-svc
  namespace: default
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kube-apiserver-svc
  namespace: default
subsets:
  - addresses:
      - ip: 10.96.0.1
    ports:
      - port: 443
        name: https
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-apiserver-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
    - host: k8s.lucascajal.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-apiserver-svc
                port:
                  number: 443
